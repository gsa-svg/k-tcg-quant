name: Settle auctions

# 종료된 경매를 다시 조회해 실제 낙찰가를 기록한다.
# 왜 자주 돌리나: 종료 항목의 조회 가능 기간이 보장되어 있지 않다. 끝난 직후에 읽어야 안전하다.
# 2시간 간격이면 어떤 경매든 종료 2시간 안에 정산된다(재시도 여유는 GIVE_UP_HOURS=30).
# data/auction-sold.json / auction-watch.json 은 이 워크플로와 collect-auction-market 만 쓴다.

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */2 * * *"

permissions:
  contents: write

concurrency:
  group: settle-auctions
  cancel-in-progress: false

jobs:
  settle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
      EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
      EBAY_MARKETPLACE_ID: EBAY_US

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Settle
        run: node tools/settle-auctions.js

      - name: Guard
        run: node tools/guard-invariants.js

      - name: Commit changes
        run: |
          if git diff --quiet data/auction-sold.json data/auction-watch.json; then
            echo "Nothing settled."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/auction-sold.json data/auction-watch.json
          git commit -m "Settle completed auctions"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Push failed after 3 attempts."
              exit 1
            fi
            echo "Push raced; rebasing before retry $((attempt + 1))/3."
            git pull --rebase
          done

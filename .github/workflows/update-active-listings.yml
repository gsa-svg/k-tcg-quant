name: Update active listing links
# rerun 2026-07-10 (secret fixed)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/update-active-listings.yml"
  schedule:
    # Every day at 03:00 KST (18:00 UTC).
    - cron: "0 18 * * *"

permissions:
  contents: write

concurrency:
  group: update-active-listing-links
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
      EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
      EBAY_MARKETPLACE_ID: EBAY_US
      EBAY_SEARCH_LIMIT: "100"
      EBAY_PSA_ACTIVE_SEARCH_LIMIT: "100"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify scripts
        run: |
          node --check packs.js
          node --check tools/update-ebay-pack-prices.js
          node --check tools/update-ebay-english-pack-prices.js
          node --check tools/backfill-english-box-series.js
          node --check tools/update-ebay-psa10-active-links.js
          node --check tools/update-box-series-history.js
          node --check tools/update-card-series-history.js
          node --check tools/update-supply-series.js
          node --check tools/generate-set-pages.js
          node --check tools/generate-card-pages.js
          node --check tools/fetch-card-images.js
          node --check tools/fetch-box-images.js
          node --check tools/build-market-index.js
          node --check tools/generate-market-page.js
          node --check tools/generate-ko-pages.js
          node --check tools/generate-free-data.js
          node --check tools/inject-home-summary.js
          node --check tools/guard-invariants.js
          node tools/guard-invariants.js
          node --check tools/audit-active-listings.js
          node --check tools/audit-seo.js
          node --check tools/audit-ai-discovery.js
          node --check tools/run-with-retry.js
          node tools/test-ebay-listing-filters.js
          node tools/audit-seo.js
          node tools/audit-ai-discovery.js

      - name: Require eBay API secrets
        run: |
          if [ -z "$EBAY_CLIENT_ID" ] || [ -z "$EBAY_CLIENT_SECRET" ]; then
            echo "::error::Missing EBAY_CLIENT_ID or EBAY_CLIENT_SECRET repository secret. Active listing refresh cannot run safely."
            exit 1
          fi

      - name: Update eBay active box links
        run: |
          set -o pipefail
          mkdir -p logs
          node tools/run-with-retry.js --attempts 3 --delay-ms 10000 -- node tools/update-ebay-pack-prices.js 2>&1 | tee logs/update-ebay-pack-prices.log

      - name: Update eBay English box prices
        run: |
          set -o pipefail
          mkdir -p logs
          node tools/run-with-retry.js --attempts 3 --delay-ms 10000 -- node tools/update-ebay-english-pack-prices.js 2>&1 | tee logs/update-ebay-english-pack-prices.log

      - name: Update eBay active PSA10 links
        run: |
          set -o pipefail
          mkdir -p logs
          node tools/run-with-retry.js --attempts 3 --delay-ms 10000 -- node tools/update-ebay-psa10-active-links.js 2>&1 | tee logs/update-ebay-psa10-active-links.log

      - name: Refresh English box sold series (Finding API)
        run: |
          set -o pipefail
          mkdir -p logs
          node tools/backfill-english-box-series.js 2>&1 | tee logs/backfill-english-box-series.log || echo "Finding API unavailable - skipping"

      - name: Append box price history snapshot
        run: |
          set -o pipefail
          mkdir -p logs
          node tools/update-box-series-history.js 2>&1 | tee logs/update-box-series-history.log

      - name: Append card price history snapshot
        run: |
          set -o pipefail
          mkdir -p logs
          node tools/update-card-series-history.js 2>&1 | tee logs/update-card-series-history.log

      - name: Append supply series (listing counts + new/gone)
        run: |
          set -o pipefail
          mkdir -p logs
          node tools/update-supply-series.js 2>&1 | tee logs/update-supply-series.log

      - name: Audit active listing quality
        run: |
          set -o pipefail
          mkdir -p logs
          node tools/audit-active-listings.js 2>&1 | tee logs/audit-active-listings.log

      - name: Regenerate SEO set pages (bake fresh data)
        run: |
          set -o pipefail
          mkdir -p logs
          node tools/build-market-index.js 2>&1 | tee logs/build-market-index.log
          node tools/generate-market-page.js 2>&1 | tee logs/generate-market-page.log
          node tools/fetch-box-images.js 2>&1 | tee logs/fetch-box-images.log
          node tools/fetch-card-images.js 2>&1 | tee logs/fetch-card-images.log
          node tools/generate-card-pages.js 2>&1 | tee logs/generate-card-pages.log
          node tools/generate-set-pages.js 2>&1 | tee logs/generate-set-pages.log
          node tools/generate-ko-pages.js 2>&1 | tee logs/generate-ko-pages.log
          node tools/generate-free-data.js 2>&1 | tee logs/generate-free-data.log
          node tools/inject-home-summary.js 2>&1 | tee logs/inject-home-summary.log

      - name: Upload update logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: active-listing-update-logs
          path: |
            logs/
            data/active-listing-audit.json
          if-no-files-found: ignore

      - name: Guard invariants (block bad deploys)
        run: |
          set -o pipefail
          mkdir -p logs
          node tools/guard-invariants.js 2>&1 | tee logs/guard-invariants.log

      - name: Commit changes
        run: |
          if git diff --quiet data/onepiece-packs.json data/active-listing-audit.json data/supply-series.json data/listing-ids.json sets/ cards/ ko/ img/ card-img/ market.html index.html packs.html free-data.html opbox-set-prices.csv sitemap.xml; then
            echo "No active listing changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/onepiece-packs.json data/active-listing-audit.json data/supply-series.json data/listing-ids.json sets/ cards/ ko/ img/ card-img/ market.html index.html packs.html free-data.html opbox-set-prices.csv sitemap.xml
          git commit -m "Update active listing links + regenerate SEO set/card pages"
          # A content edit can land while this long-running collector is working.
          # Rebase generated data onto the latest main instead of losing the run.
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Push failed after 3 attempts. Generated data was not published."
              exit 1
            fi
            echo "Push raced with another commit; rebasing before retry $((attempt + 1))/3."
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::Generated files conflict with newer main. Manual review required."
              exit 1
            fi
            sleep $((attempt * 5))
          done

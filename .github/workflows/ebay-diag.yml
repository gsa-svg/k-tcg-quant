name: eBay API diagnostic (on demand)
# recheck 2026-07-10a
# recheck 2026-07-10b (secret fixed?)
# GitHub 러너에서 eBay OAuth/Browse 실제 상태를 뽑아 logs/ebay-diag.json 커밋. 자기 파일 push시 발동(루프 없음).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ebay-diag.yml"

permissions:
  contents: write

concurrency:
  group: ebay-diag
  cancel-in-progress: false

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
      EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Diagnose eBay API
        run: node tools/ebay-diag.js
      - name: Commit result
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logs/ebay-diag.json
          git commit -m "chore: ebay diag result" || echo "no change"
          git push || echo "push failed"

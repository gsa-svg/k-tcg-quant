name: Update market data

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 05:00 KST (Sunday 20:00 UTC) — staggered 2h after the daily
    # active-listings run (18:00 UTC) to avoid a same-time push race on onepiece-packs.json.
    - cron: "0 20 * * 0"

permissions:
  contents: write

concurrency:
  group: update-market-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
      EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
      EBAY_MARKETPLACE_ID: EBAY_US
      EBAY_SEARCH_LIMIT: "100"
      EBAY_PSA_SEARCH_LIMIT: "100"
      EBAY_ENGLISH_NM_SEARCH_LIMIT: "100"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify scripts
        run: |
          node --check packs.js
          node --check tools/update-ebay-pack-prices.js
          node --check tools/update-ebay-english-nm-prices.js
          node --check tools/update-ebay-japanese-nm-sold-prices.js
          node --check tools/update-box-series-history.js
          node --check tools/update-psa-weekly-history.js
          node --check tools/import-gemrate-psa-history.js
          node --check tools/audit-price-quality.js
          node --check tools/audit-active-listings.js
          node --check tools/build-market-index.js
          node --check tools/generate-market-page.js
          node --check tools/generate-card-pages.js
          node --check tools/generate-set-pages.js
          node --check tools/generate-ko-pages.js
          node --check tools/guard-invariants.js
          node --check tools/audit-seo.js
          node --check tools/audit-ai-discovery.js
          node --check tools/run-with-retry.js
          node tools/test-price-outliers.js
          node tools/test-price-quality-audit.js
          node tools/test-update-psa-weekly-history.js
          node tools/test-import-gemrate-psa-history.js
          node tools/audit-seo.js
          node tools/audit-ai-discovery.js

      - name: Require eBay API secrets
        run: |
          if [ -z "$EBAY_CLIENT_ID" ] || [ -z "$EBAY_CLIENT_SECRET" ]; then
            echo "::error::Missing EBAY_CLIENT_ID or EBAY_CLIENT_SECRET repository secret. Market data refresh cannot run safely."
            exit 1
          fi

      - name: Update eBay pack prices
        run: |
          set -o pipefail
          mkdir -p logs
          node tools/run-with-retry.js --attempts 3 --delay-ms 10000 -- node tools/update-ebay-pack-prices.js 2>&1 | tee logs/update-ebay-pack-prices.log

      - name: Update eBay English NM prices
        run: |
          set -o pipefail
          mkdir -p logs
          node tools/run-with-retry.js --attempts 3 --delay-ms 10000 -- node tools/update-ebay-english-nm-prices.js 2>&1 | tee logs/update-ebay-english-nm-prices.log

      - name: Update eBay Japanese NM sold prices
        run: |
          set -o pipefail
          mkdir -p logs
          node tools/update-ebay-japanese-nm-sold-prices.js --continue-on-error 2>&1 | tee logs/update-ebay-japanese-nm-sold-prices.log

      - name: Append box price history snapshot
        run: |
          set -o pipefail
          mkdir -p logs
          node tools/update-box-series-history.js 2>&1 | tee logs/update-box-series-history.log

      - name: Append verified PSA weekly history
        run: |
          set -o pipefail
          mkdir -p logs
          node tools/update-psa-weekly-history.js 2>&1 | tee logs/update-psa-weekly-history.log

      - name: Audit price quality
        run: |
          set -o pipefail
          mkdir -p logs
          node tools/audit-price-quality.js --hide-suspicious-nm 2>&1 | tee logs/audit-price-quality-hide.log
          node tools/audit-price-quality.js 2>&1 | tee logs/audit-price-quality.log
          node tools/audit-active-listings.js 2>&1 | tee logs/audit-active-listings.log

      - name: Regenerate SEO pages with fresh market data
        run: |
          set -o pipefail
          node tools/build-market-index.js 2>&1 | tee logs/build-market-index.log
          node tools/generate-market-page.js 2>&1 | tee logs/generate-market-page.log
          node tools/generate-card-pages.js 2>&1 | tee logs/generate-card-pages.log
          node tools/generate-set-pages.js 2>&1 | tee logs/generate-set-pages.log
          node tools/generate-ko-pages.js 2>&1 | tee logs/generate-ko-pages.log
          node tools/guard-invariants.js 2>&1 | tee logs/guard-invariants.log
          node tools/audit-seo.js 2>&1 | tee logs/audit-seo.log
          node tools/audit-ai-discovery.js 2>&1 | tee logs/audit-ai-discovery.log

      - name: Upload update logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-data-update-logs
          path: |
            logs/
            data/price-quality-audit.json
            data/japanese-nm-sold-audit.json
            data/active-listing-audit.json
          if-no-files-found: ignore

      - name: Commit changes
        run: |
          if git diff --quiet data/onepiece-packs.json data/psa-population-snapshots.json data/price-quality-audit.json data/japanese-nm-sold-audit.json data/active-listing-audit.json sets/ cards/ ko/ market.html sitemap.xml; then
            echo "No market data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/onepiece-packs.json data/psa-population-snapshots.json data/price-quality-audit.json data/japanese-nm-sold-audit.json data/active-listing-audit.json sets/ cards/ ko/ market.html sitemap.xml
          git commit -m "Update market data"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Push failed after 3 attempts. Fresh market pages were not published."
              exit 1
            fi
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::Generated files conflict with newer main. Manual review required."
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Verify PSA population snapshot freshness
        if: always()
        run: |
          node tools/update-psa-weekly-history.js --check-freshness
